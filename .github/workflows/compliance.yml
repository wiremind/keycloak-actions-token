name: Compliance

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  commit:
    name: Commit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Conventional commit check
        uses: cocogitto/cocogitto-action@v4.1.0
        with:
          command: check
